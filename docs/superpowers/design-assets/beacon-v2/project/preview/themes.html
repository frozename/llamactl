<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Themes</title>
<style>
body{padding:16px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1}
.t{border-radius:10px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid}
.t .name{font-size:14px;font-weight:600}
.t .name em{font-style:normal;font-weight:400}
.t .swatches{display:flex;gap:2px;height:28px;border-radius:4px;overflow:hidden;margin-top:10px}
.t .swatches div{flex:1}
.t .h{font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;opacity:.7}
.sirius{background:#141418;color:#ededf0;border-color:rgba(255,255,255,0.06)}
.sirius em{color:#6366f1}
.ember{background:#131210;color:#ece7da;border-color:rgba(255,245,220,0.06)}
.ember em{color:#f59e0b}
.clinical{background:#ffffff;color:#14110d;border-color:rgba(30,25,20,0.08)}
.clinical em{color:#2563eb}
.scrubs{background:#0e1c18;color:#d4ede8;border-color:rgba(180,230,220,0.08)}
.scrubs em{color:#14b8a6}
</style></head><body>
<div class="grid">
  <div class="t sirius"><div class="h">01 · default</div><div><div class="name">Sirius <em>— indigo</em></div><div class="swatches"><div style="background:#0c0c0f"></div><div style="background:#1a1a20"></div><div style="background:#22222a"></div><div style="background:#4f46e5"></div><div style="background:#6366f1"></div></div></div></div>
  <div class="t ember"><div class="h">02 · warm</div><div><div class="name">Ember <em>— amber</em></div><div class="swatches"><div style="background:#0a0a08"></div><div style="background:#1a1915"></div><div style="background:#22201b"></div><div style="background:#d97706"></div><div style="background:#f59e0b"></div></div></div></div>
  <div class="t clinical"><div class="h">03 · light</div><div><div class="name">Clinical <em>— paper</em></div><div class="swatches"><div style="background:#faf9f7"></div><div style="background:#f3f2ef"></div><div style="background:#e6e5e0"></div><div style="background:#1d4ed8"></div><div style="background:#2563eb"></div></div></div></div>
  <div class="t scrubs"><div class="h">04 · ops</div><div><div class="name">Scrubs <em>— teal</em></div><div class="swatches"><div style="background:#07130f"></div><div style="background:#13241f"></div><div style="background:#1a2e28"></div><div style="background:#0d9488"></div><div style="background:#14b8a6"></div></div></div></div>
</div>
</body></html>
