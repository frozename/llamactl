<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Brand ramps</title>
<style>
body{gap:14px}
.row{display:flex;flex-direction:column;gap:4px}
.eye{display:flex;justify-content:space-between;align-items:baseline}
.eye .name{font-size:12px;font-weight:600;color:var(--color-text)}
.ramp{display:grid;grid-template-columns:repeat(11,1fr);gap:2px;height:34px;border-radius:6px;overflow:hidden}
.ramp div{display:flex;align-items:flex-end;padding:3px;font-family:var(--font-mono);font-size:8px;color:rgba(255,255,255,0.5)}
.ramp div.l{color:rgba(0,0,0,0.5)}
</style></head><body>
<div class="row"><div class="eye"><span class="name">Indigo · Sirius</span><span class="eyebrow">500 = brand</span></div>
<div class="ramp"><div class="l" style="background:#eef2ff">50</div><div class="l" style="background:#e0e7ff">100</div><div class="l" style="background:#c7d2fe">200</div><div class="l" style="background:#a5b4fc">300</div><div style="background:#818cf8">400</div><div style="background:#6366f1">500</div><div style="background:#4f46e5">600</div><div style="background:#4338ca">700</div><div style="background:#3730a3">800</div><div style="background:#312e81">900</div><div style="background:#1e1b4b">950</div></div></div>
<div class="row"><div class="eye"><span class="name">Amber · Ember</span><span class="eyebrow">500 = brand</span></div>
<div class="ramp"><div class="l" style="background:#fffbeb">50</div><div class="l" style="background:#fef3c7">100</div><div class="l" style="background:#fde68a">200</div><div class="l" style="background:#fcd34d">300</div><div style="background:#fbbf24">400</div><div style="background:#f59e0b">500</div><div style="background:#d97706">600</div><div style="background:#b45309">700</div><div style="background:#92400e">800</div><div style="background:#78350f">900</div><div style="background:#451a03">950</div></div></div>
<div class="row"><div class="eye"><span class="name">Teal · Scrubs</span><span class="eyebrow">500 = brand</span></div>
<div class="ramp"><div class="l" style="background:#f0fdfa">50</div><div class="l" style="background:#ccfbf1">100</div><div class="l" style="background:#99f6e4">200</div><div class="l" style="background:#5eead4">300</div><div style="background:#2dd4bf">400</div><div style="background:#14b8a6">500</div><div style="background:#0d9488">600</div><div style="background:#0f766e">700</div><div style="background:#115e59">800</div><div style="background:#134e4a">900</div><div style="background:#042f2e">950</div></div></div>
</body></html>
