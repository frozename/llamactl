<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Buttons</title>
<style>
body{padding:20px;gap:14px;justify-content:center}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{all:unset;display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;border:1px solid transparent;font-family:var(--font-sans)}
.btn-primary{background:#6366f1;color:#fff}
.btn-secondary{background:#22222a;color:#ededf0;border-color:rgba(255,255,255,0.06)}
.btn-ghost{background:transparent;color:#a8a8b2}
.btn-outline{background:transparent;color:#ededf0;border-color:rgba(255,255,255,0.12)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:10px 18px;font-size:14px}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;font-size:10px;font-family:var(--font-mono);color:#a8a8b2;background:#1a1a20;border:1px solid rgba(255,255,255,0.06);border-bottom-width:2px;border-radius:3px}
</style></head><body>
<div class="eyebrow">Button · 4 styles · 3 sizes</div>
<div class="row"><button class="btn btn-primary">Primary</button><button class="btn btn-secondary">Secondary</button><button class="btn btn-ghost">Ghost</button><button class="btn btn-outline">Outline</button></div>
<div class="row"><button class="btn btn-primary btn-sm">Small</button><button class="btn btn-primary">Regular</button><button class="btn btn-primary btn-lg">Large</button></div>
<div class="row"><button class="btn btn-primary">▶ Deploy</button><button class="btn btn-secondary">Cancel <span class="kbd">esc</span></button></div>
</body></html>
