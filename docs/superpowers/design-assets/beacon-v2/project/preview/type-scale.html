<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Type scale</title>
<style>
body{padding:16px;gap:0}
.row{display:grid;grid-template-columns:60px 1fr 110px;gap:16px;align-items:baseline;padding:8px 10px;border-bottom:1px solid var(--color-border-subtle)}
.row:last-child{border:none}
.sz{font-family:var(--font-mono);font-size:10px;color:var(--color-text-tertiary)}
.sa{color:var(--color-text);line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.us{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-tertiary);text-align:right}
</style></head><body>
<div class="row"><div class="sz">56 / 58</div><div class="sa" style="font-size:44px;font-weight:600;letter-spacing:-0.03em">Page title</div><div class="us">h1 · hero</div></div>
<div class="row"><div class="sz">28 / 34</div><div class="sa" style="font-size:24px;font-weight:600;letter-spacing:-0.01em">Section title</div><div class="us">h2</div></div>
<div class="row"><div class="sz">20 / 28</div><div class="sa" style="font-size:18px;font-weight:600">Subsection</div><div class="us">h3</div></div>
<div class="row"><div class="sz">14 / 22</div><div class="sa" style="font-size:14px">Body · primary docs copy</div><div class="us">body</div></div>
<div class="row"><div class="sz">13 / 20</div><div class="sa" style="font-size:13px">UI · buttons, inputs, menus</div><div class="us">ui</div></div>
<div class="row"><div class="sz">11 / 16</div><div class="sa" style="font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:#70707a">Micro · eyebrow · kbd</div><div class="us">eyebrow</div></div>
</body></html>
