<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Card</title>
<style>
body{padding:16px;gap:10px;justify-content:center}
.card{background:#141418;border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
.eye{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#70707a;margin-bottom:12px}
.eye .orb{width:6px;height:6px;border-radius:50%;background:#6366f1;box-shadow:0 0 8px #6366f1}
.title{font-size:20px;font-weight:600;margin-bottom:6px;letter-spacing:-0.01em}
.title em{font-style:normal;color:#6366f1;font-weight:400}
.body{font-size:13px;line-height:1.6;color:#a8a8b2}
.foot{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.03)}
.tag{font-family:var(--font-mono);font-size:10px;color:#70707a}
.btn{all:unset;padding:5px 10px;font-size:11px;background:#22222a;border-radius:6px;color:#ededf0;cursor:pointer;font-family:var(--font-sans)}
</style></head><body>
<div class="eyebrow">Card · content surface, radius-xl, shadow-sm</div>
<div class="card">
  <div class="eye"><span class="orb"></span>Principle · 02</div>
  <div class="title">Semantics <em>before</em> paint</div>
  <div class="body">Components never name a color. They reach for <span style="font-family:var(--font-mono);font-size:12px;color:#ededf0;background:#1a1a20;padding:1px 5px;border-radius:3px">surface-2</span>, <span style="font-family:var(--font-mono);font-size:12px;color:#ededf0;background:#1a1a20;padding:1px 5px;border-radius:3px">text-secondary</span>. Status hues stay fixed across themes.</div>
  <div class="foot"><span class="tag">token-driven</span><button class="btn">Copy</button></div>
</div>
</body></html>
