<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Iconography</title>
<style>
body{padding:16px;gap:10px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;flex:1}
.g{background:#141418;border:1px solid rgba(255,255,255,0.03);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px}
.sym{font-size:18px;color:#ededf0;line-height:1}
.mono{font-family:var(--font-mono);font-size:9px;color:#70707a}
</style></head><body>
<div class="eyebrow">Icons · unicode + geometric glyphs (no emoji, no icon font)</div>
<div class="grid">
  <div class="g"><div class="sym">▸</div><div class="mono">collapse</div></div>
  <div class="g"><div class="sym">▾</div><div class="mono">expand</div></div>
  <div class="g"><div class="sym">▲</div><div class="mono">up</div></div>
  <div class="g"><div class="sym">▼</div><div class="mono">down</div></div>
  <div class="g"><div class="sym" style="color:#34d399">●</div><div class="mono">status</div></div>
  <div class="g"><div class="sym">◉</div><div class="mono">orb</div></div>
  <div class="g"><div class="sym">✓</div><div class="mono">check</div></div>
  <div class="g"><div class="sym">×</div><div class="mono">close</div></div>
  <div class="g"><div class="sym">☰</div><div class="mono">menu</div></div>
  <div class="g"><div class="sym">⌕</div><div class="mono">search</div></div>
  <div class="g"><div class="sym">◐</div><div class="mono">tokens</div></div>
  <div class="g"><div class="sym">↺</div><div class="mono">history</div></div>
  <div class="g"><div class="sym">⎇</div><div class="mono">branch</div></div>
  <div class="g"><div class="sym">⚙</div><div class="mono">settings</div></div>
  <div class="g"><div class="sym">⌘</div><div class="mono">cmd</div></div>
  <div class="g"><div class="sym">↗</div><div class="mono">share</div></div>
</div>
</body></html>
