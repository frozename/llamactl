<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Keyboard</title>
<style>
body{padding:18px;gap:14px;justify-content:center}
.row{display:flex;gap:6px;align-items:center;font-size:13px;color:#a8a8b2}
.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;font-size:11px;font-family:var(--font-mono);color:#a8a8b2;background:#1a1a20;border:1px solid rgba(255,255,255,0.1);border-bottom-width:2px;border-radius:4px}
.lbl{margin-left:10px;font-family:var(--font-sans);font-size:12px;color:#a8a8b2}
</style></head><body>
<div class="eyebrow">Keyboard — kbd chip, raised bottom border</div>
<div class="row"><span class="kbd">⌘</span><span class="kbd">K</span><span class="lbl">Open command palette</span></div>
<div class="row"><span class="kbd">⌘</span><span class="kbd">⇧</span><span class="kbd">P</span><span class="lbl">Run command</span></div>
<div class="row"><span class="kbd">⌘</span><span class="kbd">⇧</span><span class="kbd">D</span><span class="lbl">Deploy</span></div>
<div class="row"><span class="kbd">esc</span><span class="lbl">Close / cancel</span></div>
</body></html>
