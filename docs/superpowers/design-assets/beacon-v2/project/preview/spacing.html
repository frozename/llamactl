<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Spacing</title>
<style>
body{padding:16px;gap:6px}
.grid{display:flex;flex-direction:column;gap:4px;flex:1;justify-content:center}
.row{display:grid;grid-template-columns:50px 1fr 60px;gap:12px;align-items:center;font-family:var(--font-mono);font-size:10px;color:#70707a}
.name{color:#ededf0}
.bar{height:10px;background:#6366f1;border-radius:2px}
.val{text-align:right}
</style></head><body>
<div class="eyebrow">Spacing scale · 4px base</div>
<div class="grid">
  <div class="row"><span class="name">s-1</span><span class="bar" style="width:4px"></span><span class="val">4px</span></div>
  <div class="row"><span class="name">s-2</span><span class="bar" style="width:8px"></span><span class="val">8px</span></div>
  <div class="row"><span class="name">s-3</span><span class="bar" style="width:12px"></span><span class="val">12px</span></div>
  <div class="row"><span class="name">s-4</span><span class="bar" style="width:16px"></span><span class="val">16px</span></div>
  <div class="row"><span class="name">s-6</span><span class="bar" style="width:24px"></span><span class="val">24px</span></div>
  <div class="row"><span class="name">s-8</span><span class="bar" style="width:32px"></span><span class="val">32px</span></div>
  <div class="row"><span class="name">s-12</span><span class="bar" style="width:48px"></span><span class="val">48px</span></div>
  <div class="row"><span class="name">s-16</span><span class="bar" style="width:64px"></span><span class="val">64px</span></div>
</div>
</body></html>
