<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Neutral ramp</title>
<style>
body{gap:8px}
.eye{display:flex;justify-content:space-between;align-items:baseline}
.eye .name{font-size:13px;font-weight:600;color:var(--color-text)}
.ramp{display:grid;grid-template-columns:repeat(11,1fr);gap:2px;height:64px;border-radius:6px;overflow:hidden}
.ramp div{display:flex;align-items:flex-end;padding:4px;font-family:var(--font-mono);font-size:9px;color:rgba(255,255,255,0.5)}
.ramp div.light{color:rgba(0,0,0,0.5)}
</style></head><body>
<div class="eye"><span class="name">Neutral</span><span class="eyebrow">surface · text</span></div>
<div class="ramp">
  <div style="background:#fafafa" class="light">50</div><div style="background:#e5e5e5" class="light">100</div><div style="background:#d4d4d4" class="light">200</div><div style="background:#a3a3a3" class="light">300</div><div style="background:#737373">400</div><div style="background:#525252">500</div><div style="background:#404040">600</div><div style="background:#2e2e2e">700</div><div style="background:#1f1f1f">800</div><div style="background:#141418">900</div><div style="background:#0c0c0f">950</div>
</div>
</body></html>
