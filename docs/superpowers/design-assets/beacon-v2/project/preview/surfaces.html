<!doctype html><html data-theme="sirius"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><title>Surfaces</title>
<style>
body{padding:16px;gap:8px}
.page{background:#0c0c0f;border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:16px;flex:1;display:flex;flex-direction:column;gap:10px}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;flex:1}
.row div{border-radius:6px;padding:10px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.6)}
.s0{background:#0c0c0f;border:1px dashed rgba(255,255,255,0.12)}
.s1{background:#141418;border:1px solid rgba(255,255,255,0.04)}
.s2{background:#1a1a20}
.s3{background:#22222a}
.s4{background:#2d2d38;color:#ededf0}
.hex{color:rgba(255,255,255,0.35)}
</style></head><body>
<div class="page">
<div class="eyebrow">Surface stack · dark (Sirius)</div>
<div class="row">
  <div class="s0">surface-0<span class="hex">#0c0c0f</span></div>
  <div class="s1">surface-1<span class="hex">#141418</span></div>
  <div class="s2">surface-2<span class="hex">#1a1a20</span></div>
  <div class="s3">surface-3<span class="hex">#22222a</span></div>
  <div class="s4">surface-4<span class="hex">#2d2d38</span></div>
</div>
</div>
</body></html>
