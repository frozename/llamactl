# Granite 4.1 3B on M4 Pro (`local`).
#
# Top agentic candidate per the 2026-05-06 fleet eval (composite 1.000:
# 88 tps, 12/12 tool-calling, perfect context retrieval + JSON output).
# Tiny enough to run alongside other workloads.
#
# Apply:
#   llamactl apply -f templates/workloads/granite41-3b-local.yaml
apiVersion: llamactl/v1
kind: ModelRun
metadata:
  name: granite41-3b-local
  labels:
    family: granite41
    role: agentic
spec:
  node: local
  target:
    kind: alias
    value: granite41-3b-q4
  extraArgs:
    - --ctx-size
    - "8192"
    - -ngl
    - "999"
    - --flash-attn
    - "on"
    - -ub
    - "512"
  restartPolicy: Always
  endpoint:
    host: 127.0.0.1
    port: 8092
