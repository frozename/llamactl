# Gemma 4 26B-A4B UD-Q6_K_XL + MTP bench variant on `local`.
#
# Sweet-spot quant between Q5 and Q8 — 23.3 GB weights. Coexists with
# Granite on a 48 GB box.
apiVersion: llamactl/v1
kind: ModelRun
metadata:
  name: gemma4-26b-a4b-mtp-q6kxl-local
  labels:
    family: gemma4
    role: bench-quant-sweep
spec:
  binary: /Volumes/WorkSSD/src/llama.cpp-atomic/build/bin/llama-server
  node: local
  enabled: true
  resources:
    expectedMemoryGiB: 24
  target:
    kind: rel
    value: gemma-4-26B-A4B-it-GGUF/gemma-4-26B-A4B-it-UD-Q6_K_XL.gguf
  extraArgs:
    - --alias
    - gemma4-26b-a4b-mtp
    - --mtp-head
    - /Volumes/WorkSSD/ai-models/llama.cpp/models/gemma-4-26B-A4B-it-assistant-GGUF/gemma-4-26B-A4B-it-assistant.Q4_K_M.gguf
    - --spec-type
    - mtp
    - --draft-block-size
    - "3"
    - --draft-max
    - "8"
    - --draft-min
    - "0"
    - -ngl
    - "99"
    - -ngld
    - "99"
    - -ctk
    - turbo3
    - -ctv
    - turbo3
    - -ctkd
    - turbo3
    - -ctvd
    - turbo3
    - --flash-attn
    - "on"
    - --ctx-size
    - "65536"
    - --no-warmup
    - -np
    - "1"
    - --jinja
    - -b
    - "2048"
    - -ub
    - "1024"
    - --reasoning
    - "off"
    - --swa-full
    # Re-enable prompt prefix reuse — fork commit "Gemma 4 time-to-first-token
    # drops from 8-12s to <1s by unblocking cache reuse" makes this safe again
    # on TurboQuant KV. Min chunk size 256 (default elsewhere) matches the
    # bench's shared system+tools prefix length.
    - --cache-reuse
    - "256"
  restartPolicy: Always
  endpoint:
    host: 127.0.0.1
    port: 8181
