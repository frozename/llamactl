# Gemma 4 26B-A4B + MTP maestro pilot on `local`.
#
# Requires the local node-agent (scripts/launchd/com.llamactl.node-agent.plist)
# to be loaded — `apply` is a tRPC call into that agent. The agent
# plist sets LLAMA_CPP_BIN to the atomic-fork build dir so the
# reconciler picks the right `llama-server` for the MTP head args.
#
# Apply:
#   llamactl apply -f templates/workloads/gemma4-26b-a4b-mtp-local.yaml
#
# Verify:
#   llamactl get workloads
#   curl http://127.0.0.1:8181/health
apiVersion: llamactl/v1
kind: ModelRun
metadata:
  name: gemma4-26b-a4b-mtp-local
  labels:
    family: gemma4
    role: maestro-pilot
spec:
  node: local
  target:
    kind: rel
    value: gemma-4-26B-A4B-it-GGUF/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf
  extraArgs:
    - --alias
    - gemma4-26b-a4b-mtp
    - --mtp-head
    - /Volumes/WorkSSD/ai-models/llama.cpp/models/gemma-4-26B-A4B-it-assistant-GGUF/gemma-4-26B-A4B-it-assistant.Q4_K_M.gguf
    - --spec-type
    - mtp
    - --draft-block-size
    - "3"
    - --draft-max
    - "8"
    - --draft-min
    - "0"
    - -ngl
    - "99"
    - -ngld
    - "99"
    - -ctk
    - turbo3
    - -ctv
    - turbo3
    - -ctkd
    - turbo3
    - -ctvd
    - turbo3
    - --flash-attn
    - "on"
    - --ctx-size
    - "32768"
    - --no-warmup
    - -np
    - "1"
    - --jinja
  restartPolicy: Always
  endpoint:
    host: 127.0.0.1
    port: 8181
