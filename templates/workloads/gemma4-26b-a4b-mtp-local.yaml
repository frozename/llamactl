# Gemma 4 26B-A4B + MTP maestro pilot on `local`.
#
# Requires the local node-agent (scripts/launchd/com.llamactl.node-agent.plist)
# to be loaded — `apply` is a tRPC call into that agent. The agent
# plist sets LLAMA_CPP_BIN to the atomic-fork build dir so the
# reconciler picks the right `llama-server` for the MTP head args.
#
# Apply:
#   llamactl apply -f templates/workloads/gemma4-26b-a4b-mtp-local.yaml
#
# Verify:
#   llamactl get workloads
#   curl http://127.0.0.1:8181/health
apiVersion: llamactl/v1
kind: ModelRun
metadata:
  name: gemma4-26b-a4b-mtp-local
  labels:
    family: gemma4
    role: maestro-pilot
spec:
  binary: /Volumes/WorkSSD/src/llama.cpp-atomic/build/bin/llama-server
  node: local
  enabled: true
  resources:
    expectedMemoryGiB: 18
  target:
    kind: rel
    # Tuning sweep 2026-05-13: UD-Q4_K_M matches the larger Q5/Q6/Q8 quants
    # on pass rate (0.972) when paired with f16 KV — same RAM footprint as
    # the prior UD-Q4_K_XL baseline, higher decode tps, leaves Granite room
    # to coexist on a 48 GB box.
    value: gemma-4-26B-A4B-it-GGUF/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf
  extraArgs:
    - --alias
    - gemma4-26b-a4b-mtp
    - --mtp-head
    - /Volumes/WorkSSD/ai-models/llama.cpp/models/gemma-4-26B-A4B-it-assistant-GGUF/gemma-4-26B-A4B-it-assistant.Q4_K_M.gguf
    - --spec-type
    - mtp
    - --draft-block-size
    - "3"
    - --draft-max
    - "8"
    - --draft-min
    - "0"
    - -ngl
    - "99"
    - -ngld
    - "99"
    # KV cache type: f16 instead of turbo3. The 2026-05-13 tuning grid
    # showed f16 lifts pass rate from 0.944 → 0.972 (one extra correct
    # routing call) and bumps median decode from 54 → 64 tps for this
    # 36-task maestro bench. Cost: ~2× KV memory vs turbo3, but at
    # ctx 65536 with SWA + a 17 GB Q4_K_M model we stay under 30 GB
    # total and Granite still coexists.
    - -ctk
    - f16
    - -ctv
    - f16
    - -ctkd
    - f16
    - -ctvd
    - f16
    - --flash-attn
    - "on"
    - --ctx-size
    - "65536"
    - --no-warmup
    - -np
    - "1"
    - --jinja
    - -b
    - "2048"
    # Bigger ubatch — better prefill throughput on M4 Pro for the long
    # claude-agent-acp prompts. Trade: slightly higher peak VRAM during prefill.
    - -ub
    - "1024"
    # Disable gemma's default chain-of-thought reasoning. Without this, gemma
    # fills every response's output budget with `thinking` blocks and never
    # emits a `text` block — claude-agent-acp's SDK then exits with "process
    # exited unexpectedly" because the response shape is unusable. Per-request
    # `chat_template_kwargs.enable_thinking=true` can re-enable when needed.
    - --reasoning
    - "off"
    # Enable full-size SWA cache so the sliding-window-attention layers can
    # preserve KV across turns within a session. Without this, llama-server
    # logs "forcing full prompt re-processing due to lack of cache data"
    # every tool call. Cost: more VRAM for the KV cache (manageable at
    # ctx-size 65536 on M4 Pro). Gain: turns 2+ pay only the delta-prefill,
    # not the full 25k-token system prompt.
    - --swa-full
    # Re-enable prompt prefix reuse — fork commit "Gemma 4 time-to-first-token
    # drops from 8-12s to <1s by unblocking cache reuse" makes this safe again
    # on TurboQuant KV. Min chunk size 256 (default elsewhere) matches the
    # bench's shared system+tools prefix length.
    - --cache-reuse
    - "256"
  restartPolicy: Always
  endpoint:
    host: 127.0.0.1
    port: 8181
