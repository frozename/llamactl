apiVersion: llamactl/v1
kind: ModelHost
metadata:
  name: stress-fleet-c-qwen3-8b-mac-mini
  labels:
    fleet: stress-c
    family: qwen-3
spec:
  engine: omlx
  node: mac-mini
  enabled: true
  binary: /Volumes/AI-DATA/src/omlx/.venv/bin/omlx
  resources:
    expectedMemoryGiB: 5
  endpoint:
    host: 0.0.0.0
    port: 8205
  hostedModels:
    - rel: Qwen3-8B-MLX-4bit
  extraArgs:
    - --max-concurrent-requests
    - "4"
    - --paged-ssd-cache-dir
    - /Volumes/AI-DATA/cache/omlx
  restartPolicy: Always
  timeoutSeconds: 180
