# Experiment L: single oMLX process serving all 3 models, with the
# AGX_RELAX_CDM_CTXSTORE_TIMEOUT=1 Metal env (zcbenz's workaround for MLX
# issue #2670 — uncatchable abort() on Metal command-buffer errors under
# concurrent multi-model load).
#
# Workaround works only if the env propagates from agent → oMLX subprocess.
# Allowlist updated in packages/remote/src/server/modelhost.ts; agent must
# be restarted with AGX_RELAX_CDM_CTXSTORE_TIMEOUT=1 in its own env (via
# launchd plist EnvironmentVariables).
apiVersion: llamactl/v1
kind: ModelHost
metadata:
  name: stress-fleet-l-mac-mini
  labels:
    fleet: stress-l
    family: multi
spec:
  engine: omlx
  node: mac-mini
  enabled: true
  binary: /Volumes/AI-DATA/src/omlx/.venv/bin/omlx
  resources:
    expectedMemoryGiB: 14
  endpoint:
    host: 0.0.0.0
    port: 8194
  hostedModels:
    - rel: mlx-community/granite-4.1-3b-4bit
  extraArgs:
    - --max-concurrent-requests
    - "1"
    - --max-process-memory
    - "88%"
    - --paged-ssd-cache-dir
    - /Volumes/AI-DATA/cache/omlx
  restartPolicy: Always
  timeoutSeconds: 180
