# Granite 4.1 3B on `mac-mini`, claiming the `local` alias on :8090.
#
# Replaces the Gemma 4 E4B server that previously held this slot for
# penumbra agent / memory-refinement offloading. Granite 4.1 3B
# benched at composite 1.000 (perfect 12/12 tool-calling) on mac-mini
# vs Gemma 4 E4B's 0.766 in the same harness — strict upgrade for
# agentic workloads.
#
# Apply:
#   llamactl --node mac-mini apply -f templates/workloads/granite41-3b-mac-mini.yaml
apiVersion: llamactl/v1
kind: ModelRun
metadata:
  name: granite41-3b-mac-mini
  labels:
    family: granite41
    role: agentic
spec:
  node: mac-mini
  target:
    kind: rel
    value: granite-4.1-3b-GGUF/granite-4.1-3b-Q4_K_M.gguf
  extraArgs:
    - --alias
    - local
    - --ctx-size
    - "8192"
    - -ngl
    - "999"
    - --flash-attn
    - "on"
    - -ub
    - "512"
  restartPolicy: Always
  endpoint:
    host: 127.0.0.1
    port: 8090
