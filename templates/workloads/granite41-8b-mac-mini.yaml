# Granite 4.1 8B on `mac-mini` — penumbra's `local` agent for agentic
# planner/executor offload. Fleet eval (2026-05-06): composite 0.896
# with perfect 12/12 tool-calling, ~20 tps on mac-mini's memory bandwidth.
#
# Tuning notes:
#   - --ctx-size 32768: 8B Q4_K_M is ~5 GB; with -np 2 each slot gets
#     16k of headroom, which is the per-conversation budget we want
#     for penumbra planner+executor dispatches. KV at q8_0 keeps
#     total KV ~1.3 GB so this fits comfortably alongside the model.
#   - --cache-type-k/v q8_0: q8_0 KV is essentially lossless on Granite
#     for agentic prompts; halves KV footprint vs fp16.
#   - -b 2048 -ub 512: Apple Silicon community recommendation, matches
#     the prior gemma-mini-q4 config that ran stably on this box.
#   - -ngl 999 --flash-attn on: full Metal offload, FA reduces KV pressure.
#   - --no-warmup: shaves ~10s off startup; warmup only matters for
#     first-token latency anyway and we have keep-alive working.
#   - -np 2: 2 parallel slots so penumbra dispatches don't head-of-line
#     block each other; per-slot ctx is 16k after split.
#   - timeoutSeconds 180: cold mmap of a 5 GB GGUF on mac-mini's
#     external-volume APFS can exceed the default 60s; 3 min absorbs
#     that without a false-negative apply timeout.
#
# Apply:
#   llamactl --node mac-mini apply -f templates/workloads/granite41-8b-mac-mini.yaml
apiVersion: llamactl/v1
kind: ModelRun
metadata:
  name: granite41-8b-mac-mini
  labels:
    family: granite41
    role: agentic
spec:
  node: mac-mini
  # Disabled 2026-05-14 pm: superseded by qwen3-8b-mac-mini.yaml which
  # serves both this memory-efficacy classifier role AND home-mgmt from
  # a single -np 2 server. Granite 4.1's tool-call output also doesn't
  # parse cleanly through claude-agent-acp (project_home_mgmt_long_lived
  # _flow_2026-05-14), so we'd want to migrate this side off Granite
  # eventually too — the merge does both at once.
  # Re-enable if a workload that NEEDS Granite specifically (e.g., a
  # post-Granite-4.2 quant family or a downstream consumer wired only
  # to Granite's tokenizer) lands on the roadmap.
  enabled: false
  resources:
    expectedMemoryGiB: 7
  target:
    kind: rel
    value: granite-4.1-8b-GGUF/granite-4.1-8b-Q4_K_M.gguf
  # 2026-05-14 pm RAM-budget pass (mac-mini is 16 GB, not 24 GB; verified
  # via sysctl hw.memsize). Coexistence with the qwen3-8b-home-mgmt-mac-mini
  # workload (:8091, ~9 GB resident) puts the box at ~17 GB total which dips
  # into swap. Three changes vs the May-13 config:
  #   - --ctx-size 16384 (was 32768): memory-efficacy batches are ~700 input
  #     + ~1000 output tokens; 16k slot has 4× headroom. Saves ~1 GB KV.
  #   - -np 1 (was 2): frees ~1.5 GB KV. Future bench runs at concurrency>1
  #     will queue to single slot (~2× wall) instead of overlapping.
  #     Penumbra production memory-efficacy classifier currently has 0
  #     jobs/day (parser bug pending); parallelism was anticipatory.
  #   - --cache-reuse 256: memory-efficacy batches share a stable ~500-token
  #     prefix (bucket definitions, schema, prompt template); reuse saves
  #     prompt-eval per request after the first warmup batch. No RAM cost.
  # Combined savings: ~2.5 GB. Eliminates swap pressure with home-mgmt up.
  extraArgs:
    - --alias
    - local
    - --ctx-size
    - "16384"
    - -b
    - "2048"
    - -ub
    - "512"
    - -ngl
    - "999"
    - --flash-attn
    - "on"
    - --cache-type-k
    - q8_0
    - --cache-type-v
    - q8_0
    - -np
    - "1"
    - --cache-reuse
    - "256"
    - --no-warmup
  restartPolicy: Always
  timeoutSeconds: 180
  endpoint:
    host: 127.0.0.1
    port: 8090
