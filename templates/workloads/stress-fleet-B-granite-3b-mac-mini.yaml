apiVersion: llamactl/v1
kind: ModelHost
metadata:
  name: stress-fleet-b-granite-3b-mac-mini
  labels:
    fleet: stress-b
    family: granite-4.1
spec:
  engine: omlx
  node: mac-mini
  enabled: true
  binary: /Volumes/AI-DATA/src/omlx/.venv/bin/omlx
  resources:
    expectedMemoryGiB: 3
  endpoint:
    host: 0.0.0.0
    port: 8202
  hostedModels:
    - rel: mlx-community/granite-4.1-3b-4bit
  extraArgs:
    - --max-concurrent-requests
    - "4"
  restartPolicy: Always
  timeoutSeconds: 180
