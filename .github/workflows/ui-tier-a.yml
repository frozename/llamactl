name: ui-tier-a

# Tier A UI smoke. Module-loop + 6 shell smokes. Blocks PR.
# See docs/superpowers/specs/2026-04-25-ui-e2e-smoke-design.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ui-tier-a-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout llamactl
        uses: actions/checkout@v4
        with:
          path: llamactl

      - name: Checkout electron-mcp (pinned)
        uses: actions/checkout@v4
        with:
          repository: frozename/electron-mcp
          ref: fceaaa3ed06d1ce85fe7ece8934c2a40ea2b351d
          path: electron-mcp

      # llamactl's package.json carries file:../nova/packages/* deps.
      # Without the sibling checkout, `bun install --frozen-lockfile`
      # fails to link them. Mirrors the layout cross-repo-smoke.yml
      # already uses.
      - name: Checkout nova
        uses: actions/checkout@v4
        with:
          repository: frozename/nova
          ref: main
          path: nova

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install nova
        working-directory: nova
        run: bun install --frozen-lockfile || bun install

      - name: Install llamactl
        working-directory: llamactl
        run: bun install --frozen-lockfile

      - name: Install electron-mcp
        working-directory: electron-mcp
        run: bun install --frozen-lockfile

      - name: Run Tier A
        working-directory: llamactl
        env:
          ELECTRON_MCP_DIR: ${{ github.workspace }}/electron-mcp
        run: scripts/smoke-tier-a.sh

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tier-a-screenshots
          path: llamactl/tests/ui-flows/**/*.png
          if-no-files-found: ignore
