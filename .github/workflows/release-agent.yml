name: release-agent

# Builds per-platform llamactl-agent binaries via `bun build --compile`
# and attaches them to a GitHub Release with SHA-256 checksums.
#
# Triggers:
#   * Push of a semver tag (vX.Y.Z) — standard release path.
#   * Manual workflow_dispatch — "rebuild current HEAD" without tagging,
#     for rehearsing the matrix after a CI fix. Manual runs do NOT
#     publish a release — artifacts stay in the workflow run.
#
# Design locks (see plans/infra-supply-chain.md):
#   * Tag-driven only — no binaries on every push to main.
#   * `bun build --compile` with cross-compilation from ubuntu
#     (linux-* targets) and macos (darwin-* targets).
#   * SHA-256 alongside each binary.
#   * Cosign keyless signing (I.5.3): sigstore issues an ephemeral
#     cert keyed to the workflow's GitHub OIDC token; the resulting
#     .sig + .cert files sit alongside each binary on the release.
#     Verifiers run `cosign verify-blob --certificate-identity-regexp
#     '^https://github.com/<owner>/<repo>/.github/workflows/release-agent.yml@refs/tags/.+$'
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com`
#     to confirm provenance. No long-lived keys.
#   * Environment scrubbed before the build step so no repo secret
#     leaks into a compiled binary.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            os: macos-latest
          - target: bun-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      # contents:read — default, sufficient since `release` job handles upload.
      # id-token:write — required for cosign keyless signing via GitHub OIDC.
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.1

      - name: Build llamactl-agent binary
        # Scrub repo-level env so the compiled binary can't embed
        # anything the operator didn't intend. Only the minimum PATH
        # set remains so bun + system tools resolve.
        env:
          NODE_ENV: production
        run: |
          set -eu
          PLATFORM="${{ matrix.target }}"
          PLATFORM_SLUG="${PLATFORM#bun-}"
          mkdir -p dist
          OUT="dist/llamactl-agent-${PLATFORM_SLUG}"

          bun build --compile \
            --target="${PLATFORM}" \
            packages/cli/src/bin.ts \
            --outfile "${OUT}"

          # SHA-256 — the basename-only variant lets operators
          # `shasum -a 256 -c llamactl-agent-<p>.sha256` from any dir.
          ( cd dist && shasum -a 256 "$(basename "${OUT}")" > "$(basename "${OUT}").sha256" )

          ls -lh "${OUT}" "${OUT}.sha256"

      - name: Cosign sign-blob (keyless)
        # --yes auto-accepts the sigstore/fulcio/rekor usage prompts
        # that cosign otherwise shows interactively.
        # COSIGN_EXPERIMENTAL is no-op on v2 but defended-in-depth.
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -eu
          PLATFORM="${{ matrix.target }}"
          PLATFORM_SLUG="${PLATFORM#bun-}"
          OUT="dist/llamactl-agent-${PLATFORM_SLUG}"

          cosign sign-blob --yes \
            --output-signature "${OUT}.sig" \
            --output-certificate "${OUT}.cert" \
            "${OUT}"

          ls -lh "${OUT}.sig" "${OUT}.cert"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: llamactl-agent-${{ matrix.target }}
          path: |
            dist/llamactl-agent-*
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish GitHub Release
    needs: build
    # Only publish on tag push. workflow_dispatch runs leave the
    # binaries as workflow artifacts for inspection.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        run: |
          ls -lh dist/
          echo "---"
          for f in dist/llamactl-agent-*.sha256; do
            echo "==> $f"
            cat "$f"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/llamactl-agent-*
          fail_on_unmatched_files: true
          generate_release_notes: true
